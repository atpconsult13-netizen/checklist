<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Табло — ТеМАХ Директор</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root {
  --navy:#0D1B2A; --indigo:#2F54EB; --indigo-l:#EDF2FF;
  --green:#0A7C59; --green-l:#E6F9F1;
  --red:#C0392B; --red-l:#FDE8E8;
  --amber:#B45309; --amber-l:#FEF3C7;
  --slate:#64748B; --slate-l:#E2E8F0; --slate-xl:#F8FAFC;
  --white:#fff; --text:#0F172A;
  --r:10px; --sh:0 1px 8px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#EEF2F7;color:var(--text);min-height:100vh;}

.topbar{background:var(--navy);position:sticky;top:0;z-index:200;}
.topbar-stripe{height:3px;background:linear-gradient(90deg,#2F54EB,#0A7C59);}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:10px;}
.topbar-title{font-size:14px;font-weight:700;color:#fff;}
.topbar-sub{font-size:10px;color:#64748B;margin-top:-1px;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.btn-refresh{padding:6px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;}
.last-upd{font-size:10px;color:#64748B;white-space:nowrap;}

/* FILTER BAR */
.filter-bar{background:var(--white);border-bottom:1px solid var(--slate-l);padding:10px 16px;position:sticky;top:53px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-group{display:flex;flex-direction:column;gap:3px;min-width:120px;flex:1;}
.filter-group label{font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;}
.filter-select,.filter-input{padding:6px 9px;border:1.5px solid var(--slate-l);border-radius:6px;font-size:12px;font-family:inherit;color:var(--text);background:var(--slate-xl);width:100%;}
.filter-select:focus,.filter-input:focus{outline:none;border-color:var(--indigo);}
.filter-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.filter-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--slate-l);background:var(--white);color:var(--slate);transition:all .12s;}
.filter-tag.on{background:var(--indigo);border-color:var(--indigo);color:#fff;}
.filter-tag.on-ok{background:var(--green);border-color:var(--green);color:#fff;}
.filter-tag.on-warn{background:#D97706;border-color:#D97706;color:#fff;}
.filter-tag.on-bad{background:var(--red);border-color:var(--red);color:#fff;}
.filter-clear{padding:6px 12px;background:var(--slate-xl);border:1.5px solid var(--slate-l);border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--slate);white-space:nowrap;}
.filter-clear:hover{border-color:var(--red);color:var(--red);}
.filter-results{font-size:11px;color:var(--slate);padding:5px 0 0;}

/* TABS */
.view-tabs{display:flex;background:var(--white);border-bottom:1px solid var(--slate-l);padding:0 16px;}
.view-tab{padding:9px 14px;font-size:12px;font-weight:600;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.view-tab.on{color:var(--indigo);border-bottom-color:var(--indigo);}

.page{padding:12px 16px 40px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:600px){.kpi-row{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--white);border-radius:var(--r);padding:12px;box-shadow:var(--sh);border-top:3px solid var(--slate-l);}
.kpi.ok{border-top-color:var(--green);} .kpi.warn{border-top-color:#D97706;} .kpi.bad{border-top-color:var(--red);} .kpi.info{border-top-color:var(--indigo);}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;}
.kpi-sub{font-size:11px;color:var(--slate);margin-top:1px;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.data-table th{background:var(--navy);color:#94A3B8;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:9px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;}
.data-table th:hover{color:#fff;}
.data-table th .sort-icon{margin-left:4px;opacity:.5;}
.data-table th.sorted .sort-icon{opacity:1;color:var(--indigo);}
.data-table td{padding:9px 12px;font-size:12px;border-top:1px solid var(--slate-l);vertical-align:middle;}
.data-table tr:hover td{background:var(--slate-xl);}
.data-table tr.row-ok td{background:#F0FDF9;}
.data-table tr.row-warn td{background:#FFFBEB;}
.data-table tr.row-bad td{background:#FFF5F5;}
.td-mono{font-family:'JetBrains Mono',monospace;font-weight:600;}
.td-note{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--slate);}
.td-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.b-ok{background:var(--green-l);color:var(--green);}
.b-no{background:var(--red-l);color:var(--red);}
.b-warn{background:var(--amber-l);color:var(--amber);}

/* SECTOR HEATMAP */
.heatmap-wrap{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:auto;margin-bottom:12px;}
.heatmap-table{border-collapse:collapse;min-width:100%;}
.heatmap-table th{background:var(--navy);color:#94A3B8;font-size:10px;font-weight:700;padding:8px 10px;white-space:nowrap;text-align:center;position:sticky;top:0;}
.heatmap-table th:first-child{text-align:left;position:sticky;left:0;z-index:2;}
.heatmap-table td{padding:7px 10px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;text-align:center;border:1px solid rgba(255,255,255,.3);white-space:nowrap;}
.heatmap-table td:first-child{background:var(--navy);color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;text-align:left;position:sticky;left:0;z-index:1;white-space:nowrap;padding:7px 12px;}
.hm-great{background:#0A7C59;color:#fff;}
.hm-ok{background:#34D399;color:#065F46;}
.hm-warn{background:#FCD34D;color:#78350F;}
.hm-bad{background:#F87171;color:#7F1D1D;}
.hm-null{background:#F1F5F9;color:#94A3B8;}

/* TREND */
.trend-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:14px;margin-bottom:12px;}
.trend-title{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.trend-bars{display:flex;gap:5px;align-items:flex-end;height:80px;}
.tb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:28px;}
.tb-pct{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;}
.tb-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;}
.tb-label{font-size:8px;color:var(--slate);text-align:center;line-height:1.3;}

/* NOTES VIEW */
.note-item{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--indigo);}
.note-item.has-repeat{border-left-color:var(--red);}
.note-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.note-shop{font-size:12px;font-weight:700;color:var(--text);}
.note-date{font-size:11px;color:var(--slate);}
.note-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;}
.note-text{font-size:12px;color:var(--text);line-height:1.5;margin-bottom:4px;}
.note-repeat{font-size:11px;color:var(--red);font-weight:600;}
.note-deadline{font-size:11px;color:var(--amber);font-weight:600;}

/* CHRONIC */
.chronic-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:7px;margin-bottom:6px;background:var(--red-l);border-left:3px solid var(--red);}
.chronic-name{flex:1;font-size:12px;line-height:1.4;}
.chronic-cnt{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--red);white-space:nowrap;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid rgba(47,84,235,.2);border-top-color:var(--indigo);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:40px 20px;color:var(--slate);font-size:13px;}
.error-box{background:var(--red-l);border:1px solid #FECACA;border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--red);margin:12px 0;}
.section-title{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px;}
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px;}
.card-hdr{background:var(--navy);padding:9px 14px;font-size:11px;font-weight:700;color:#94A3B8;letter-spacing:.05em;text-transform:uppercase;}

  @media print {
    body { background: #fff !important; }
    .topbar, .filter-bar, .view-tabs, .btn-refresh { display: none !important; }
    .page { padding: 0 !important; }
    .card, .kpi, .trend-card, .heatmap-wrap, .note-item, .chronic-item {
      box-shadow: none !important;
      border: 1px solid #e2e8f0 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .card-hdr, .hm-great, .hm-ok, .hm-warn, .hm-bad { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-hdr { display: block !important; }
    @page { margin: 12mm; size: A4 landscape; }
  }
  .print-hdr { display: none; }
  .dash-pdf-btn {
    position: fixed; bottom: 20px; right: 20px; z-index: 150;
    background: var(--navy); color: #fff; border: none; border-radius: 50px;
    padding: 10px 18px; font-size: 13px; font-weight: 700; font-family: inherit;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.25);
    display: flex; align-items: center; gap: 6px; transition: all .15s;
  }
  .dash-pdf-btn:hover { background: var(--indigo); transform: translateY(-2px); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-stripe"></div>
  <div class="topbar-inner">
    <div>
      <div class="topbar-title">Табло — Директор · ТеМАХ</div>
      <div class="topbar-sub" id="lastUpd">Зареждане…</div>
    </div>
    <div class="topbar-right">
      <button class="btn-refresh" onclick="loadData()">↺ Обнови</button>
    </div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-row">
    <div class="filter-group" style="min-width:150px">
      <label>Магазин</label>
      <select class="filter-select" id="fShop" onchange="applyFilters()">
        <option value="">Всички магазини</option>
      </select>
    </div>
    <div class="filter-group" style="min-width:130px">
      <label>Сектор</label>
      <select class="filter-select" id="fSector" onchange="applyFilters()">
        <option value="">Всички сектори</option>
      </select>
    </div>
    <div class="filter-group" style="min-width:110px">
      <label>От дата</label>
      <input type="date" class="filter-input" id="fFrom" onchange="applyFilters()">
    </div>
    <div class="filter-group" style="min-width:110px">
      <label>До дата</label>
      <input type="date" class="filter-input" id="fTo" onchange="applyFilters()">
    </div>
    <div class="filter-group" style="min-width:160px">
      <label>Търси в забележки</label>
      <input type="text" class="filter-input" id="fSearch" placeholder="Ключова дума…" oninput="applyFilters()">
    </div>
    <button class="filter-clear" onclick="clearFilters()">✕ Изчисти</button>
  </div>
  <div class="filter-row" style="margin-top:8px;">
    <div style="font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;padding-top:2px;">Статус:</div>
    <div class="filter-tags">
      <span class="filter-tag" id="ftAll"    onclick="setStatusFilter('all')"   >Всички</span>
      <span class="filter-tag" id="ftBonus"  onclick="setStatusFilter('bonus')" >✅ С бонус</span>
      <span class="filter-tag" id="ftNoBonus"onclick="setStatusFilter('nobonus')">✗ Без бонус</span>
      <span class="filter-tag" id="ftOk"     onclick="setStatusFilter('ok')"    >≥85% ОК</span>
      <span class="filter-tag" id="ftWarn"   onclick="setStatusFilter('warn')"  >60–85% Внимание</span>
      <span class="filter-tag" id="ftBad"    onclick="setStatusFilter('bad')"   >&lt;60% Слаб</span>
      <span class="filter-tag" id="ftRepeat" onclick="setStatusFilter('repeat')">🔁 Повторна грешка</span>
      <span class="filter-tag" id="ftBlock"  onclick="setStatusFilter('block')" >⛔ Блокиращ</span>
    </div>
  </div>
  <div class="filter-results" id="filterResults"></div>
</div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <div class="view-tab on" id="tab-overview" onclick="switchTab('overview')">📊 Обзор</div>
  <div class="view-tab" id="tab-table"    onclick="switchTab('table')"   >📋 Таблица</div>
  <div class="view-tab" id="tab-heatmap"  onclick="switchTab('heatmap')" >🌡 Сектори</div>
  <div class="view-tab" id="tab-trend"    onclick="switchTab('trend')"   >📈 Тенденция</div>
  <div class="view-tab" id="tab-notes"    onclick="switchTab('notes')"   >💬 Коментари</div>
  <div class="view-tab" id="tab-chronic"  onclick="switchTab('chronic')" >🔁 Хронични</div>
</div>


<div class="print-hdr" style="padding:0 0 12px;border-bottom:2px solid #0D1B2A;margin-bottom:16px;">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="font-size:18px;font-weight:800;color:#0D1B2A;">ТеМАХ — Табло Директор</div>
      <div style="font-size:11px;color:#64748B;margin-top:2px;" id="dashPrintMeta">Отчет</div>
    </div>
    <div style="font-size:11px;color:#64748B;" id="dashPrintDate"></div>
  </div>
</div>
<button class="dash-pdf-btn" onclick="printDashboard()">📄 PDF отчет</button>
<div class="page">
  <div id="tabContent">
    <div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--slate)">Зареждане…</div></div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzRShMGQkdpQSQmd7GInmJ3ajbwx5qqBC1zgH7nnfjBEpzMURTz6_7JIz4qjMH_6y_z8g/exec';

const SEC_IDS   = ['s1','s2','s3','s4','s5','s6','s7','s8','s9','s10','s11','s12','s13','s14','s15','s16','s17'];
const SEC_NAMES = {
  s1:'Плочки',s2:'Строителство',s3:'Баня',s4:'Текстил',s5:'Подови настилки',
  s6:'Дом. потреби',s7:'Бои',s8:'Ел. машини',s9:'Градина',s10:'Градин. мебели',
  s11:'Крепежи',s12:'Входна зона',s13:'Вът. склад',s14:'Външ. склад',
  s15:'Плац',s16:'Касова зона',s17:'Осветление'
};

let allData     = [];
let filtered    = [];
let activeTab   = 'overview';
let statusFilter= 'all';
let sortCol     = 'date';
let sortDir     = -1;

// ── LOAD ──────────────────────────────────────────────────────────
function loadData() {
  document.getElementById('tabContent').innerHTML =
    '<div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--slate)">Зареждане…</div></div>';
  const old = document.getElementById('_jsonp');
  if (old) old.remove();
  const cb = '_cb' + Date.now();
  window[cb] = function(json) {
    delete window[cb];
    const s = document.getElementById('_jsonp'); if(s) s.remove();
    if (json && json.status === 'ok' && json.data) {
      allData = json.data;
      document.getElementById('lastUpd').textContent =
        'Обновено: ' + new Date().toLocaleTimeString('bg-BG') + ' · ' + allData.length + ' проверки';
      buildShopFilter();
      applyFilters();
    } else { showError('Грешка: ' + (json&&json.message||'неизвестна')); }
  };
  const s = document.createElement('script');
  s.id = '_jsonp';
  s.src = SHEETS_URL + '?action=getAll&callback=' + cb;
  s.onerror = () => showError('Не може да се свърже. Проверете Apps Script деплоя.');
  document.head.appendChild(s);
}

function showError(msg) {
  document.getElementById('tabContent').innerHTML = '<div class="error-box">⚠ '+msg+'</div><div style="text-align:center;padding:10px"><button onclick="loadData()" style="padding:8px 16px;background:var(--indigo);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer">Опитай отново</button></div>';
}

// ── FILTERS ───────────────────────────────────────────────────────
function buildShopFilter() {
  const shops = [...new Set(allData.map(d=>d.shop).filter(Boolean))].sort();
  const sel   = document.getElementById('fShop');
  sel.innerHTML = '<option value="">Всички магазини</option>';
  shops.forEach(s => { sel.innerHTML += '<option value="'+s+'">'+s+'</option>'; });

  const secSel = document.getElementById('fSector');
  secSel.innerHTML = '<option value="">Всички сектори</option>';
  SEC_IDS.forEach(sid => { secSel.innerHTML += '<option value="'+sid+'">'+SEC_NAMES[sid]+'</option>'; });
}

function setStatusFilter(val) {
  statusFilter = val;
  document.querySelectorAll('.filter-tag').forEach(t => {
    t.className = 'filter-tag';
    if (t.id === 'ft'+val.charAt(0).toUpperCase()+val.slice(1)) {
      t.className = 'filter-tag on';
    }
  });
  if (val==='all') document.getElementById('ftAll').className='filter-tag on';
  applyFilters();
}

function applyFilters() {
  const shop   = document.getElementById('fShop').value;
  const sector = document.getElementById('fSector').value;
  const from   = document.getElementById('fFrom').value;
  const to     = document.getElementById('fTo').value;
  const search = document.getElementById('fSearch').value.toLowerCase().trim();

  filtered = allData.filter(d => {
    if (shop   && d.shop !== shop) return false;
    if (from   && d.date < from) return false;
    if (to     && d.date > to)   return false;
    if (search && !matchSearch(d, search)) return false;

    const p = d.overallPct;
    if (statusFilter==='bonus'   && !d.bonusOk) return false;
    if (statusFilter==='nobonus' && d.bonusOk)  return false;
    if (statusFilter==='ok'      && (p===null||p<85)) return false;
    if (statusFilter==='warn'    && (p===null||p<60||p>=85)) return false;
    if (statusFilter==='bad'     && (p===null||p>=60)) return false;
    if (statusFilter==='repeat'  && !d.repeatIssues) return false;
    if (statusFilter==='block'   && !d.blockFail)    return false;

    if (sector) {
      const sp = d.sectors && d.sectors[sector];
      if (sp === null || sp === undefined) return false;
    }
    return true;
  });

  document.getElementById('filterResults').textContent =
    filtered.length + ' проверки от ' + allData.length;

  renderTab(activeTab);
}

function matchSearch(d, q) {
  const fields = [d.shop, d.manager, d.notes, d.repeatIssues, d.deadlines];
  return fields.some(f => f && f.toLowerCase().includes(q));
}

function clearFilters() {
  document.getElementById('fShop').value   = '';
  document.getElementById('fSector').value = '';
  document.getElementById('fFrom').value   = '';
  document.getElementById('fTo').value     = '';
  document.getElementById('fSearch').value = '';
  statusFilter = 'all';
  document.querySelectorAll('.filter-tag').forEach(t => t.className='filter-tag');
  document.getElementById('ftAll').className='filter-tag on';
  applyFilters();
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  renderTab(name);
}

function renderTab(name) {
  if      (name==='overview') renderOverview();
  else if (name==='table')    renderTable();
  else if (name==='heatmap')  renderHeatmap();
  else if (name==='trend')    renderTrend();
  else if (name==='notes')    renderNotes();
  else if (name==='chronic')  renderChronic();
}

// ── OVERVIEW ──────────────────────────────────────────────────────
function renderOverview() {
  if (!filtered.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма данни за избраните филтри.</p>'; return; }
  const total  = filtered.length;
  const bonus  = filtered.filter(d=>d.bonusOk).length;
  const avg    = filtered.filter(d=>d.overallPct!==null);
  const avgPct = avg.length ? Math.round(avg.reduce((a,d)=>a+d.overallPct,0)/avg.length) : null;
  const blocks = filtered.filter(d=>d.blockFail).length;
  const shops  = [...new Set(filtered.map(d=>d.shop))].length;

  // Latest per shop
  const shopMap = {};
  filtered.forEach(d => { if(!shopMap[d.shop]||d.date>shopMap[d.shop].date) shopMap[d.shop]=d; });
  const ranked = Object.values(shopMap).sort((a,b)=>(b.overallPct||0)-(a.overallPct||0));

  let h = '';

  // KPIs
  const ok_class = avgPct===null?'info':avgPct>=85?'ok':avgPct>=60?'warn':'bad';
  h += '<div class="kpi-row">'
    + kpiCard('Проверки', total, filtered.length+' записа', 'info')
    + kpiCard('Магазини', shops, 'уникални обекта', 'info')
    + kpiCard('Средна оценка', avgPct!==null?avgPct+'%':'—', 'на избраните', ok_class)
    + kpiCard('Бонус', bonus+'/'+total, Math.round(bonus/total*100)+'% одобрени', bonus===total?'ok':'warn')
    + '</div>';

  if (blocks) {
    h += '<div style="background:var(--red-l);border:1px solid #FECACA;border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red);font-weight:600">⛔ '+blocks+' проверки с блокиращ критерий</div>';
  }

  // Ranking
  h += '<div class="section-title">Класация</div><div class="card"><div class="card-hdr">Последна проверка по магазин</div>';
  ranked.forEach((d,i) => {
    const p  = d.overallPct;
    const cc = p===null?'':p>=85?'row-ok':p>=60?'row-warn':'row-bad';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.';
    h += '<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--slate-l);'+(cc==='row-ok'?'background:#F0FDF9':cc==='row-warn'?'background:#FFFBEB':cc==='row-bad'?'background:#FFF5F5':'')+'">'
      + '<span style="font-size:14px;width:28px;flex-shrink:0">'+medal+'</span>'
      + '<span style="flex:1;font-size:13px;font-weight:600">'+d.shop+'</span>'
      + '<span style="font-size:10px;color:var(--slate)">'+d.date+'</span>'
      + '<span class="td-mono" style="min-width:44px;text-align:right;color:'+(p===null?'var(--slate)':p>=85?'var(--green)':p>=60?'#D97706':'var(--red)')+'">'+( p!==null?p+'%':'—')+'</span>'
      + '<span class="td-badge '+(d.bonusOk?'b-ok':'b-no')+'">'+( d.bonusOk?'✅ Бонус':'✗ Без')+'</span>'
      + '</div>';
  });
  h += '</div>';

  document.getElementById('tabContent').innerHTML = h;
}

function kpiCard(lbl, val, sub, cls) {
  return '<div class="kpi '+cls+'"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
}

// ── TABLE ─────────────────────────────────────────────────────────
function renderTable() {
  if (!filtered.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма данни.</p>'; return; }
  const fSec = document.getElementById('fSector').value;

  let h = '<div style="overflow-x:auto"><table class="data-table"><thead><tr>'
    + thSort('date','Дата')
    + thSort('shop','Магазин')
    + thSort('manager','Управител')
    + thSort('overallPct','Обща %')
    + '<th>Бонус</th>'
    + (fSec ? '<th>'+SEC_NAMES[fSec]+'</th>' : '')
    + '<th>Блокиращ</th>'
    + '<th>Забележки</th>'
    + '<th>Повт. грешка</th>'
    + '<th>Срок/Отг.</th>'
    + '</tr></thead><tbody>';

  const sorted = [...filtered].sort((a,b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (av===null||av===undefined) av = '';
    if (bv===null||bv===undefined) bv = '';
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });

  sorted.forEach(d => {
    const p  = d.overallPct;
    const rc = p===null?'':p>=85?'row-ok':p>=60?'row-warn':'row-bad';
    const sp = fSec && d.sectors ? d.sectors[fSec] : null;
    h += '<tr class="'+rc+'">'
      + '<td>'+fmtDate(d.date)+'</td>'
      + '<td style="font-weight:600">'+d.shop+'</td>'
      + '<td>'+( d.manager||'—')+'</td>'
      + '<td class="td-mono" style="color:'+pctColor(p)+'">'+( p!==null?p+'%':'—')+'</td>'
      + '<td><span class="td-badge '+(d.bonusOk?'b-ok':'b-no')+'">'+( d.bonusOk?'✅':'✗')+'</span></td>'
      + (fSec ? '<td class="td-mono" style="color:'+pctColor(sp)+'">'+( sp!==null?sp+'%':'—')+'</td>' : '')
      + '<td><span class="td-badge '+(d.blockFail?'b-no':'b-ok')+'">'+( d.blockFail?'⛔ ДА':'ОК')+'</span></td>'
      + '<td class="td-note" title="'+(d.notes||'')+'">'+( d.notes&&d.notes!=='-'?d.notes:'—')+'</td>'
      + '<td>'+( d.repeatIssues&&d.repeatIssues!=='-'?'<span style="color:var(--red);font-weight:600">ДА</span>':'—')+'</td>'
      + '<td class="td-note" title="'+(d.deadlines||'')+'">'+( d.deadlines&&d.deadlines!=='-'?d.deadlines:'—')+'</td>'
      + '</tr>';
  });
  h += '</tbody></table></div>';
  document.getElementById('tabContent').innerHTML = h;
}

function thSort(col, label) {
  const on = sortCol===col;
  const icon = on ? (sortDir===1?'▲':'▼') : '↕';
  return '<th class="'+(on?'sorted':'')+'" onclick="setSort(''+col+'')">'+label+' <span class="sort-icon">'+icon+'</span></th>';
}

function setSort(col) {
  if (sortCol===col) sortDir *= -1; else { sortCol=col; sortDir=-1; }
  renderTable();
}

// ── HEATMAP ───────────────────────────────────────────────────────
function renderHeatmap() {
  if (!filtered.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма данни.</p>'; return; }

  // Latest per shop
  const shopMap = {};
  filtered.forEach(d => { if(!shopMap[d.shop]||d.date>shopMap[d.shop].date) shopMap[d.shop]=d; });
  const shops = Object.values(shopMap).sort((a,b)=>a.shop.localeCompare(b.shop,'bg'));

  let h = '<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><th>Магазин</th>';
  SEC_IDS.forEach(sid => { h += '<th>'+SEC_NAMES[sid]+'</th>'; });
  h += '<th>Обща</th></tr></thead><tbody>';

  shops.forEach(d => {
    h += '<tr><td>'+d.shop+'</td>';
    SEC_IDS.forEach(sid => {
      const p = d.sectors && d.sectors[sid] !== null ? d.sectors[sid] : null;
      const cls = p===null?'hm-null':p>=85?'hm-great':p>=70?'hm-ok':p>=50?'hm-warn':'hm-bad';
      h += '<td class="'+cls+'">'+( p!==null?p+'%':'—')+'</td>';
    });
    const op = d.overallPct;
    const oc = op===null?'hm-null':op>=85?'hm-great':op>=70?'hm-ok':op>=50?'hm-warn':'hm-bad';
    h += '<td class="'+oc+'" style="font-size:13px">'+( op!==null?op+'%':'—')+'</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px;padding:4px 0">'
    + '<span>Легенда:</span>'
    + '<span class="td-badge" style="background:#0A7C59;color:#fff">≥85% Отлично</span>'
    + '<span class="td-badge" style="background:#34D399;color:#065F46">70–85% Добро</span>'
    + '<span class="td-badge" style="background:#FCD34D;color:#78350F">50–70% Внимание</span>'
    + '<span class="td-badge" style="background:#F87171;color:#7F1D1D">&lt;50% Слабо</span>'
    + '</div>';

  document.getElementById('tabContent').innerHTML = h;
}

// ── TREND ─────────────────────────────────────────────────────────
function renderTrend() {
  if (!filtered.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма данни.</p>'; return; }
  const fShop  = document.getElementById('fShop').value;
  const fSec   = document.getElementById('fSector').value;
  const sorted = [...filtered].sort((a,b)=>a.date>b.date?1:-1);

  let h = '';

  if (fShop) {
    // Single shop trend
    h += '<div class="trend-card"><div class="trend-title">Тенденция — '+fShop+(fSec?' · '+SEC_NAMES[fSec]:'')+'</div>';
    h += '<div class="trend-bars">';
    sorted.slice(-16).forEach(d => {
      const pv = fSec ? (d.sectors&&d.sectors[fSec]!==null?d.sectors[fSec]:null) : d.overallPct;
      const bh = Math.max(3, (pv||0)*0.72);
      const col = pv===null?'#CBD5E1':pv>=85?'#0A7C59':pv>=60?'#D97706':'#C0392B';
      h += '<div class="tb-wrap"><div class="tb-pct" style="color:'+col+'">'+(pv!==null?pv+'%':'—')+'</div>'
        + '<div class="tb-bar" style="height:'+bh+'px;background:'+col+'"></div>'
        + '<div class="tb-label">'+fmtDate(d.date)+'</div></div>';
    });
    h += '</div></div>';
  } else {
    // All shops trend — group by shop
    const shops = [...new Set(filtered.map(d=>d.shop))].sort();
    shops.slice(0,12).forEach(shop => {
      const shopData = sorted.filter(d=>d.shop===shop).slice(-8);
      if (shopData.length < 2) return;
      h += '<div class="trend-card"><div class="trend-title">'+shop+'</div><div class="trend-bars">';
      shopData.forEach(d => {
        const pv = fSec ? (d.sectors&&d.sectors[fSec]!==null?d.sectors[fSec]:null) : d.overallPct;
        const bh = Math.max(3, (pv||0)*0.72);
        const col = pv===null?'#CBD5E1':pv>=85?'#0A7C59':pv>=60?'#D97706':'#C0392B';
        h += '<div class="tb-wrap"><div class="tb-pct" style="color:'+col+'">'+(pv!==null?pv+'%':'—')+'</div>'
          + '<div class="tb-bar" style="height:'+bh+'px;background:'+col+'"></div>'
          + '<div class="tb-label">'+fmtDate(d.date)+'</div></div>';
      });
      h += '</div></div>';
    });
  }
  document.getElementById('tabContent').innerHTML = h || '<p class="empty">Нужни са поне 2 проверки на магазин за тенденция.</p>';
}

// ── NOTES ─────────────────────────────────────────────────────────
function renderNotes() {
  const withNotes = filtered.filter(d =>
    (d.notes&&d.notes!=='-') || (d.repeatIssues&&d.repeatIssues!=='-') || (d.deadlines&&d.deadlines!=='-')
  );
  if (!withNotes.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма коментари за избраните филтри.</p>'; return; }

  const sorted = [...withNotes].sort((a,b)=>b.date>a.date?1:-1);
  let h = '<div style="font-size:11px;color:var(--slate);margin-bottom:10px">'+sorted.length+' проверки с коментари</div>';

  sorted.forEach(d => {
    const hasRepeat = d.repeatIssues && d.repeatIssues!=='-';
    h += '<div class="note-item'+(hasRepeat?' has-repeat':'')+'">'
      + '<div class="note-meta">'
      + '<span class="note-shop">'+d.shop+'</span>'
      + '<span class="note-date">'+fmtDate(d.date)+'</span>'
      + (d.manager?'<span style="font-size:11px;color:var(--slate)">'+d.manager+'</span>':'')
      + '<span class="td-badge '+(d.bonusOk?'b-ok':'b-no')+'">'+( d.bonusOk?'✅':'✗')+'</span>'
      + (d.overallPct!==null?'<span class="td-mono" style="font-size:12px;color:'+pctColor(d.overallPct)+'">'+d.overallPct+'%</span>':'')
      + '</div>';
    if (d.notes&&d.notes!=='-') h += '<div class="note-text">📝 '+d.notes+'</div>';
    if (hasRepeat)               h += '<div class="note-repeat">🔁 Повторна грешка: '+d.repeatIssues+'</div>';
    if (d.deadlines&&d.deadlines!=='-') h += '<div class="note-deadline">⏰ Срок: '+d.deadlines+'</div>';
    h += '</div>';
  });
  document.getElementById('tabContent').innerHTML = h;
}

// ── CHRONIC ───────────────────────────────────────────────────────
function renderChronic() {
  const fShop = document.getElementById('fShop').value;
  const counts = {};

  filtered.forEach(d => {
    SEC_IDS.forEach(sid => {
      const p = d.sectors && d.sectors[sid];
      if (p !== null && p !== undefined && p < 85) {
        const key = (fShop?'':d.shop+' · ')+SEC_NAMES[sid];
        counts[key] = (counts[key]||0) + 1;
      }
    });
  });

  const items = Object.entries(counts).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]);
  if (!items.length) { document.getElementById('tabContent').innerHTML='<p class="empty">Няма хронични проблеми (сектори под 85% в ≥2 проверки).</p>'; return; }

  let h = '<div style="font-size:11px;color:var(--slate);margin-bottom:10px">'+items.length+' хронични проблема</div>';
  items.forEach(([name,cnt]) => {
    const intensity = cnt>=5?'var(--red)':cnt>=3?'#EA580C':'#D97706';
    h += '<div class="chronic-item" style="border-left-color:'+intensity+'">'
      + '<span class="chronic-name">'+name+'</span>'
      + '<span class="chronic-cnt" style="color:'+intensity+'">'+cnt+'× под 85%</span>'
      + '</div>';
  });
  document.getElementById('tabContent').innerHTML = h;
}

// ── HELPERS ───────────────────────────────────────────────────────
function pctColor(p) {
  if (p===null||p===undefined) return 'var(--slate)';
  return p>=85?'var(--green)':p>=60?'#D97706':'var(--red)';
}
function fmtDate(d) {
  if (!d) return '—';
  return String(d).slice(0,10);
}

// ── INIT ──────────────────────────────────────────────────────────
document.getElementById('ftAll').className = 'filter-tag on';
loadData();
setInterval(loadData, 5*60*1000);

function printDashboard() {
  const fShop = document.getElementById('fShop').value;
  document.getElementById('dashPrintMeta').textContent =
    'Магазини: ' + (fShop||'Всички') + '  ·  Проверки: ' + filtered.length;
  document.getElementById('dashPrintDate').textContent =
    'Отпечатано: ' + new Date().toLocaleDateString('bg-BG') + ' ' + new Date().toLocaleTimeString('bg-BG');

  // Switch to overview for printing
  switchTab('overview');
  setTimeout(() => window.print(), 300);
}
</script>
